<p-drawer
  [visible]="isOpen()"
  (visibleChange)="onVisibleChange($event)"
  [modal]="isMobileMode()"
  [dismissible]="isMobileMode()"
  [closeOnEscape]="isMobileMode()"
  [closable]="isMobileMode()"
  [showCloseIcon]="isMobileMode()"
  position="left"
  styleClass="app-sidebar"
>
  <ng-template pTemplate="header">
    <img class="sidebar-logo" src="logo.svg" alt="Pyxis" />
  </ng-template>

  <p-menu [model]="menuModel" [popup]="false" styleClass="sidebar-menu" (click)="onMenuClick()" />

  <ng-template pTemplate="footer">
    <div class="sidebar-user">
      <div class="sidebar-user-avatar">{{ userInitial }}</div>
      <div class="sidebar-user-info">
        <span class="sidebar-user-name">{{ currentUser.name }}</span>
        <span class="sidebar-user-role">{{ roleLabel }}</span>
      </div>
    </div>
  </ng-template>
</p-drawer>
