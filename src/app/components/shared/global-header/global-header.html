<div class="header-accent"></div>

<p-toolbar class="global-header-toolbar">
  <ng-template pTemplate="start">
    <div class="global-header-start">
      <app-context-selector
        [treeNodes]="salesData.treeNodes()"
        [selectedId]="salesData.selectedContextId()"
        (nodeSelected)="salesData.selectedContextId.set($event)"
      />
      <app-context-filter />
    </div>
  </ng-template>

  <ng-template pTemplate="end">
    <div class="global-header-end">
      <app-period-picker />

      @if (salesData.hasActiveFilter()) {
        <p-button label="Limpiar filtros" severity="secondary" [text]="true" (onClick)="salesData.clearFilters()" />
      }
    </div>
  </ng-template>
</p-toolbar>

@if (salesData.hasActiveFilter()) {
  <div class="global-header-chips">
    <app-filter-chips-summary />
  </div>
}

<nav class="global-header-tabs">
  <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }" class="global-header-nav-link">
    Ventas General
  </a>
  <a routerLink="/detalle-ventas" routerLinkActive="is-active" class="global-header-nav-link">
    Detalle de Ventas
  </a>
</nav>
