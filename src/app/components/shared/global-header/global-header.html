<div class="header-accent"></div>
<p-toolbar class="global-header-toolbar">
  <ng-template pTemplate="start">
    <div class="global-header-start">
      <img class="app-logo" src="logo.svg" alt="Pyxis" />
      <app-context-selector
        [treeNodes]="salesData.treeNodes()"
        [selectedId]="salesData.selectedContextId()"
        (nodeSelected)="salesData.selectedContextId.set($event)"
      />
    </div>
  </ng-template>

  <ng-template pTemplate="end">
    <div class="global-header-end">
      <app-period-selector
        [periods]="salesData.periods"
        [selectedIds]="salesData.selectedPeriodIds()"
        (selectionChanged)="salesData.selectedPeriodIds.set($event)"
      />

      @if (salesData.hasActiveFilter()) {
        <p-button
          label="Limpiar Filtros"
          severity="secondary"
          [outlined]="true"
          (onClick)="salesData.clearFilters()"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </p-button>
      }
    </div>
  </ng-template>
</p-toolbar>
