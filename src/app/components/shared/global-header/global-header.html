<p-toolbar class="global-header-toolbar">
  <ng-template pTemplate="start">
    <div class="global-header-start">
      <img class="global-header-mobile-logo" src="constellation-icon.svg" alt="Pyxis" />
      <app-filters-modal #filtersModalEl />
      <p-button
        class="global-header-save-view-trigger"
        label="Guardar vista actual"
        severity="secondary"
        [text]="true"
        size="small"
        ariaLabel="Guardar vista actual"
        [pTooltip]="'Guarda la selección actual como una vista con nombre'"
        tooltipPosition="bottom"
        (onClick)="filtersModalEl.openToSaveView()"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
          <line x1="12" y1="7" x2="12" y2="13"></line>
          <line x1="9" y1="10" x2="15" y2="10"></line>
        </svg>
      </p-button>
    </div>
  </ng-template>

  <ng-template pTemplate="end">
    <nav class="global-header-tabs">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }" class="global-header-nav-link">
        Ventas General
      </a>
      <a routerLink="/detalle-ventas" routerLinkActive="is-active" class="global-header-nav-link">
        Detalle de Ventas
      </a>
    </nav>

    <button
      type="button"
      class="global-header-burger"
      aria-label="Abrir menú"
      (click)="mobileNav.toggle()"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </ng-template>
</p-toolbar>

<div class="global-header-chips-scroll">
  <app-filter-chips-summary />
  <div class="global-header-actions-sticky">
    <p-button
      label="Limpiar filtros"
      severity="secondary"
      [text]="true"
      size="small"
      (onClick)="salesData.clearFilters()"
    />
    <p-button
      severity="secondary"
      [text]="true"
      size="small"
      ariaLabel="Guardar como vista por defecto"
      [pTooltip]="'Guarda el filtro actual como la vista que se carga siempre'"
      tooltipPosition="bottom"
      (onClick)="onSaveAsDefault()"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path>
        <polyline points="17 21 17 13 7 13 7 21"></polyline>
        <polyline points="7 3 7 8 15 8"></polyline>
      </svg>
    </p-button>
  </div>
</div>
