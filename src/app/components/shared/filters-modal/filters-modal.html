<p-button
  class="filters-modal-trigger"
  label="Filtros"
  severity="secondary"
  [outlined]="true"
  (onClick)="open()"
>
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
  </svg>
</p-button>

<p-dialog
  header="Filtros"
  [(visible)]="isOpen"
  [modal]="true"
  [appendTo]="'body'"
  [style]="{ width: '88vw', height: '88vh' }"
  [contentStyle]="{ flex: '1', overflow: 'auto' }"
>
  <div class="filters-modal-body">
    <div class="filters-modal-main">
      <div class="filters-modal-top-row">
        <button type="button" class="filters-modal-top-trigger" (click)="periodDialogOpen.set(true)">
          <span class="filters-modal-config-title">Período</span>
          <span class="filters-modal-config-summary">{{ periodSummary() }}</span>
        </button>

        <button type="button" class="filters-modal-top-trigger" (click)="comparisonDialogOpen.set(true)">
          <span class="filters-modal-config-title">Comparación</span>
          <span class="filters-modal-config-summary">{{ comparisonSummary() }}</span>
        </button>

        <div class="filters-modal-top-trigger filters-modal-iva">
          <span class="filters-modal-config-title">IVA</span>
          <label class="filters-modal-iva-switch">
            <span class="filters-modal-config-summary">{{ ivaSummary() }}</span>
            <p-toggleswitch
              [ngModel]="draftIvaMode() === 'sin_iva'"
              (onChange)="draftIvaMode.set($event.checked ? 'sin_iva' : 'con_iva')"
            />
          </label>
        </div>
      </div>

      <app-context-filter [(checkedIds)]="draftCheckedIds" />
    </div>

    <app-saved-views-sidebar
      class="filters-modal-sidebar"
      [draftCheckedIds]="draftCheckedIds()"
      [(draftGranularity)]="draftGranularity"
      [(draftPeriodIds)]="draftPeriodIds"
      [draftCompare]="draftCompare()"
      [draftComparisonMode]="draftComparisonMode()"
      [draftComparisonAlignment]="draftComparisonAlignment()"
      [draftExplicitComparisonPeriodIds]="draftExplicitComparisonPeriodIds()"
      [draftIvaMode]="draftIvaMode()"
      (viewApplied)="onViewApplied()"
    />
  </div>

  <ng-template pTemplate="footer">
    <div class="filters-modal-actions">
      <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="cancel()" />
      <p-button label="Aplicar" (onClick)="apply()" />
    </div>
  </ng-template>
</p-dialog>

<p-dialog
  header="Período"
  [(visible)]="periodDialogOpen"
  [modal]="true"
  [appendTo]="'body'"
  [style]="{ width: '26rem', maxWidth: '92vw' }"
>
  <app-period-picker
    [(granularity)]="draftGranularity"
    [(periodIds)]="draftPeriodIds"
    [(compare)]="draftCompare"
  />
</p-dialog>

<p-dialog
  header="Comparación"
  [(visible)]="comparisonDialogOpen"
  [modal]="true"
  [appendTo]="'body'"
  [style]="{ width: '26rem', maxWidth: '92vw' }"
>
  <app-comparison-selector
    [granularity]="draftGranularity()"
    [(mode)]="draftComparisonMode"
    [(alignment)]="draftComparisonAlignment"
    [(explicitPeriodIds)]="draftExplicitComparisonPeriodIds"
  />
</p-dialog>
