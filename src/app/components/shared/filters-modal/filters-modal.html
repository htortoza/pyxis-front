<p-button
  class="filters-modal-trigger"
  label="Filtros"
  severity="secondary"
  [outlined]="true"
  (onClick)="open()"
>
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
  </svg>
</p-button>

<p-dialog
  [(visible)]="isOpen"
  [modal]="true"
  [appendTo]="'body'"
  [style]="{ width: '88vw', height: '88vh' }"
  [contentStyle]="{ flex: '1', overflow: 'auto' }"
>
  <ng-template pTemplate="header">
    <div class="filters-modal-header">
      <span class="filters-modal-header-title">Filtros</span>
      <p-button
        label="Guardar vista actual"
        severity="secondary"
        [text]="true"
        size="small"
        (onClick)="openSaveViewPopover($event)"
      />
    </div>
  </ng-template>

  <div class="filters-modal-body">
    <div class="filters-modal-main">
      <div class="filters-modal-top-row">
        <button type="button" class="filters-modal-top-trigger" (click)="periodPopoverEl.toggle($event)">
          <span class="filters-modal-config-title">Período</span>
          <span class="filters-modal-config-summary">{{ periodSummary() }}</span>
        </button>

        <button type="button" class="filters-modal-top-trigger" (click)="comparisonPopoverEl.toggle($event)">
          <span class="filters-modal-config-title">Comparación</span>
          <span class="filters-modal-config-summary">{{ comparisonSummary() }}</span>
        </button>

        <div class="filters-modal-top-trigger filters-modal-iva">
          <span class="filters-modal-config-title">IVA</span>
          <label class="filters-modal-iva-switch">
            <span class="filters-modal-config-summary">{{ ivaSummary() }}</span>
            <p-toggleswitch
              [ngModel]="draftIvaMode() === 'sin_iva'"
              (onChange)="draftIvaMode.set($event.checked ? 'sin_iva' : 'con_iva')"
            />
          </label>
        </div>
      </div>

      <app-context-filter [(checkedIds)]="draftCheckedIds" />
    </div>

    <app-saved-views-sidebar
      #savedViewsSidebarEl
      class="filters-modal-sidebar"
      (viewApplied)="onViewApplied()"
      (saveRequested)="onSidebarSaveRequested($event)"
    />

    <!-- Siempre visible (no detrás de un colapsable), igual que Vistas Guardadas -- ver
         FiltersModalComponent para por qué esto vive acá y no en el sidebar. -->
    <div class="filters-modal-presets">
      <span class="filters-modal-presets-title">Accesos Rápidos</span>
      @for (group of presetGroups; track group.label) {
        <div class="filters-modal-preset-group">
          <span class="filters-modal-preset-group-label">{{ group.label }}</span>
          <div class="filters-modal-preset-list">
            @for (preset of group.presets; track preset.key) {
              <button type="button" class="filters-modal-preset-chip" (click)="applyPreset(preset)">
                {{ preset.label }}
              </button>
            }
          </div>
        </div>
      }
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="filters-modal-actions">
      <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="cancel()" />
      <p-button label="Aplicar" (onClick)="apply()" />
    </div>
  </ng-template>
</p-dialog>

<p-popover
  #periodPopoverEl
  styleClass="filters-modal-popover-panel"
  [style]="{ width: '26rem', maxWidth: '92vw' }"
  [appendTo]="'body'"
>
  <span class="filters-modal-popover-title">Período</span>
  <app-period-picker
    [(granularity)]="draftGranularity"
    [(periodIds)]="draftPeriodIds"
  />
  <div class="filters-modal-popover-actions">
    <p-button label="Aceptar" size="small" (onClick)="periodPopoverEl.hide()" />
  </div>
</p-popover>

<p-popover
  #comparisonPopoverEl
  styleClass="filters-modal-popover-panel"
  [style]="{ width: '26rem', maxWidth: '92vw' }"
  [appendTo]="'body'"
>
  <span class="filters-modal-popover-title">Comparación</span>
  <app-comparison-selector
    [granularity]="draftGranularity()"
    [(mode)]="draftComparisonMode"
    [(alignment)]="draftComparisonAlignment"
    [(explicitPeriodIds)]="draftExplicitComparisonPeriodIds"
  />
  <div class="filters-modal-popover-actions">
    <p-button label="Aceptar" size="small" (onClick)="comparisonPopoverEl.hide()" />
  </div>
</p-popover>

<p-popover
  #saveViewPopoverEl
  styleClass="filters-modal-popover-panel"
  [style]="{ width: '22rem', maxWidth: '92vw' }"
  [appendTo]="'body'"
>
  <span class="filters-modal-popover-title">Guardar vista actual</span>
  <input
    pInputText
    type="text"
    placeholder="Nombre de la vista"
    [ngModel]="saveViewLabel()"
    (ngModelChange)="saveViewLabel.set($event)"
  />
  <div class="filters-modal-save-view-scope">
    <p-button label="Personal" size="small" [outlined]="saveViewScope() !== 'personal'" (onClick)="saveViewScope.set('personal')" />
    @if (savedViews.canCreateTeamViews()) {
      <p-button label="Equipo" size="small" [outlined]="saveViewScope() !== 'equipo'" (onClick)="saveViewScope.set('equipo')" />
    }
  </div>
  <div class="filters-modal-popover-actions">
    <p-button label="Cancelar" severity="secondary" [text]="true" size="small" (onClick)="saveViewPopoverEl.hide()" />
    <p-button label="Guardar" size="small" (onClick)="confirmSaveView()" />
  </div>
</p-popover>
