<svg class="mini-sparkline" [attr.viewBox]="viewBox" preserveAspectRatio="none">
  @if (polylinePoints(); as pts) {
    <polyline
      [attr.points]="pts"
      fill="none"
      [attr.stroke]="color"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  }
</svg>
