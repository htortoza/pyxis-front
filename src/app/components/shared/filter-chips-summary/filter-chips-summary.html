<div class="filter-chips-summary-row">
  <span class="filter-chips-summary-legend">Filtros aplicados</span>

  <p-chip [label]="periodsChipLabel()" [removable]="true" (onRemove)="resetPeriods()" />

  @if (comparisonChipLabel(); as label) {
    <p-chip [label]="label" />
  }

  @if (ivaChipLabel(); as label) {
    <p-chip [label]="label" />
  }

  @for (chip of tiendaChips(); track chip.id) {
    <p-chip [label]="chip.label" [removable]="true" (onRemove)="removeTienda(chip.id)" />
  }
</div>
