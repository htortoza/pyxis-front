<app-global-header />

<main class="page-body">
  @if (salesData.loading()) {
    <app-loading-skeleton height="480px" />
  } @else {
    <app-sales-detail-tree-table
      [facts]="scopedFacts()"
      [selectedPeriodIds]="salesData.selectedPeriodIds()"
      [periods]="salesData.periods"
    />
  }
</main>
