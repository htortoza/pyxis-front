@if (salesData.loading()) {
  <div class="kpi-grid">
    <app-loading-skeleton height="90px" />
    <app-loading-skeleton height="90px" />
    <app-loading-skeleton height="90px" />
    <app-loading-skeleton height="90px" />
  </div>
} @else {
  <div class="kpi-grid">
    <app-kpi-card label="Ventas Totales" [value]="ventasTotalesValue()" [deltaPct]="salesData.compareToPrevious() ? ventasTotalesDelta() : null" />
    <app-kpi-card label="Transacciones" [value]="transaccionesValue()" [deltaPct]="salesData.compareToPrevious() ? transaccionesDelta() : null" />
    <app-kpi-card
      label="Unidades por Transacción"
      [value]="unidadesPorTransaccionValue()"
      [deltaPct]="salesData.compareToPrevious() ? unidadesPorTransaccionDelta() : null"
    />
    <app-kpi-card label="Ticket Promedio" [value]="ticketPromedioValue()" [deltaPct]="salesData.compareToPrevious() ? ticketPromedioDelta() : null" />
  </div>
}
