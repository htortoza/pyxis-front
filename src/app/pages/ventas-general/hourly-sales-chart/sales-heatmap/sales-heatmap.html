<div class="heatmap">
  <div class="heatmap-row heatmap-header-row">
    <div class="heatmap-corner"></div>
    @for (col of columnHeaders(); track col.hourIndex) {
      <div class="heatmap-col-label">
        @if (col.showLabel) {
          {{ col.label }}
        }
      </div>
    }
  </div>

  @for (row of rows(); track row.dayLabel) {
    <div class="heatmap-row">
      <div class="heatmap-day-label">{{ row.dayLabel }}</div>
      @for (cell of row.cells; track cell.hourLabel) {
        <div
          class="heat-cell"
          [class.heat-cell--light-text]="cell.useLightText"
          [style.background-color]="cell.background"
          [title]="cell.tooltip"
        >{{ cell.formattedAmountCompact }}</div>
      }
    </div>
  }
</div>

<div class="heatmap-legend">
  <span class="heatmap-legend-label">Menor</span>
  <div class="heatmap-legend-scale">
    @for (step of legendSteps; track step) {
      <div class="heat-cell heatmap-legend-swatch" [style.opacity]="step"></div>
    }
  </div>
  <span class="heatmap-legend-label">Mayor</span>
</div>
