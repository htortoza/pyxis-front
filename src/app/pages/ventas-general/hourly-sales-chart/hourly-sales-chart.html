<p-card>
  <div class="chart-header">
    <div class="chart-heading">
      <h2 class="chart-title">{{ chartTitle() }}</h2>
      <p class="chart-subtitle">{{ chartSubtitle() }}</p>
    </div>
    <div class="view-toggle">
      <p-button
        label="Por Hora"
        size="small"
        [outlined]="viewMode() !== 'bars'"
        (onClick)="setViewMode('bars')"
      />
      <p-button
        label="Por Día"
        size="small"
        [outlined]="viewMode() !== 'daily'"
        (onClick)="setViewMode('daily')"
      />
      <p-button
        label="Gráfico de Calor"
        size="small"
        [outlined]="viewMode() !== 'heatmap'"
        (onClick)="setViewMode('heatmap')"
      />
    </div>
  </div>

  <div class="chart-body">
    @if (salesData.loading()) {
      <app-loading-skeleton height="100%" />
    } @else {
      @switch (viewMode()) {
        @case ('bars') {
          <app-hourly-bar-chart
            [seriesByPeriod]="salesData.hourlySeriesByPeriod()"
            [periods]="salesData.periods()"
            [selectedPeriodIds]="salesData.selectedPeriodIds()"
          />
        }
        @case ('daily') {
          <app-daily-bar-chart [series]="salesData.dailySeries()" />
        }
        @case ('heatmap') {
          <app-sales-heatmap [matrix]="salesData.heatmapMatrix()" />
        }
      }
    }
  </div>
</p-card>
